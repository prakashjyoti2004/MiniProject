<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DermChat - AI Skin Consultant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-grad: linear-gradient(145deg, #4f46e5, #3730a3);
            --bg-color: #f8fafc;
            --white: #ffffff;
            --text-dark: #1e293b;
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-color); 
            opacity: 0; 
            transition: opacity 0.4s ease-in-out; 
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }
        body.page-loaded { opacity: 1; }

        .nav-link { position: relative; padding: 2px; transition: all 0.3s; display: flex; align-items: center; gap: 6px; }
        .nav-link::after { content: ""; position: absolute; width: 0%; height: 2px; left: 0; bottom: 0; background-color: var(--primary-color); transition: width 0.3s; }
        .nav-link:hover::after, .nav-link.active::after { width: 100%; }

        /* Responsive Chat Card */
        .chat-card {
            width: 100%;
            max-width: 480px;
            background: var(--white);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            /* Mobile settings */
            height: calc(100dvh - 60px); /* Adjusts perfectly under the header */
            border-radius: 0;
            box-shadow: none;
            border: none;
            margin: 0;
        }
        
        /* Desktop settings */
        @media (min-width: 640px) {
            .chat-card {
                height: 600px;
                border-radius: 24px;
                box-shadow: 0 20px 40px rgba(79, 70, 229, 0.15);
                border: 1px solid rgba(0,0,0,0.05);
                margin: 20px auto;
            }
        }
        
        .chat-header {
            background: var(--primary-grad);
            color: white;
            padding: 20px 15px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            position: relative;
            z-index: 10;
        }

        @media (min-width: 640px) {
            .chat-header {
                padding: 30px 20px;
                border-bottom-left-radius: 20px;
                border-bottom-right-radius: 20px;
            }
        }

        .chat-header h2 {
            font-size: 1.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .chat-header p {
            font-size: 0.85rem;
            opacity: 0.9;
        }
        
        #chat-window {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #f8fafc;
        }

        @media (min-width: 640px) {
            #chat-window { padding: 20px; }
        }
        
        #chat-window::-webkit-scrollbar { width: 6px; }
        #chat-window::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .message {
            max-width: 90%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            line-height: 1.5;
            word-wrap: break-word;
            white-space: pre-wrap;
            animation: fadeIn 0.4s ease forwards;
            opacity: 0;
            transform: translateY(10px);
            font-family: 'Poppins', sans-serif;
        }

        @media (min-width: 640px) {
            .message { 
                max-width: 85%; 
                padding: 14px 20px;
                font-size: 0.95rem;
            }
        }
        
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
        
        .user { align-self: flex-end; background: var(--primary-grad); color: white; border-bottom-right-radius: 4px; }
        .ai { align-self: flex-start; background: var(--white); color: var(--text-dark); border-bottom-left-radius: 4px; border: 1px solid #e2e8f0; }
        
        .input-area { 
            padding: 1px 15px; 
            background: var(--white); 
            display: flex; 
            gap: 10px; 
            border-top: 1px solid #f1f5f9; 
            align-items: center;
        }

        @media (min-width: 640px) {
            .input-area { padding: 20px; }
        }
        
        input {
            flex: 1;
            padding: 12px 18px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 60px;
            outline: none;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            transition: border-color 0.3s;
        }

        input:focus { border-color: var(--primary-color); }

        @media (min-width: 640px) {
            input { padding: 15px 20px; font-size: 0.95rem; }
        }
        
        .send-btn-custom {
            background: var(--primary-grad);
            color: white;
            width: 46px; height: 46px;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            transition: 0.3s transform, 0.3s opacity;
            cursor: pointer;
            border: none;
            flex-shrink: 0;
        }

        @media (min-width: 640px) {
            .send-btn-custom { width: 54px; height: 54px; }
        }

        .send-btn-custom:hover { transform: scale(1.05); }
        .send-btn-custom:disabled { opacity: 0.6; cursor: not-allowed; transform: scale(1); }
        
        .loading { color: var(--primary-color); font-weight: 600; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% {opacity: 0.5;} 50% {opacity: 1;} }
    </style>
</head>
<body class="min-h-[100dvh] flex flex-col relative">

    <header class="w-full h-[60px] px-4 md:px-10 flex justify-between items-center bg-white shadow-sm sticky top-0 z-50">
        <a href="/" class="text-xl md:text-2xl font-extrabold text-[var(--primary-color)] flex items-center gap-2">
            <i class="ph-fill ph-dna"></i> <span>DermAI</span>
        </a>
        <nav class="flex">
            <a href="/" class="nav-link text-gray-700 font-semibold text-sm sm:text-base">
                <i class="ph-bold ph-house text-lg sm:text-xl text-[var(--primary-color)]"></i> 
                <span class="hidden sm:inline">Home</span>
            </a>
        </nav>
    </header>

    <main class="flex-grow flex items-center justify-center w-full sm:p-4">
        <div class="chat-card">
            <div class="chat-header">
                <h2><i class="ph-fill ph-robot"></i> DermAI Expert</h2>
                <p>Your gentle skin companion</p>
            </div>
            
            <div id="chat-window">
                <div class="message ai">Hi! I am DermAI, your personal skin guide. What's on your mind today?</div>
            </div>
            
            <div class="input-area">
                <input type="text" id="user-input" placeholder="Ask about acne, dry skin..." onkeypress="handleEnter(event)" autocomplete="off">
                <button id="send-btn" class="send-btn-custom" onclick="sendMessage()" aria-label="Send message">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="sm:w-6 sm:h-6"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            document.body.classList.add("page-loaded");
        });

        async function sendMessage() {
            const inputElement = document.getElementById("user-input");
            const btn = document.getElementById("send-btn");
            const userText = inputElement.value.trim();

            if (!userText) return;

            addMessage(userText, 'user');
            inputElement.value = "";
            btn.disabled = true;
            
            const loadingId = addMessage("<span class='loading'>Thinking...</span>", 'ai', true);

            try {
                const response = await fetch('/api/chat', {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: userText })
                });

                const data = await response.json();
                
                if (data.error) throw new Error(data.error);

                const aiText = data.reply;
                typeWriterEffect(loadingId, aiText);
                
            } catch (error) {
                console.error("Error:", error);
                document.getElementById(loadingId).innerText = "Sorry, the server is busy. Please try again in a moment!";
            } finally {
                btn.disabled = false;
                // Focus back on input area for desktop users after sending
                if(window.innerWidth > 640) {
                    inputElement.focus();
                }
            }
        }

        function typeWriterEffect(elementId, fullText, speed = 15) {
            const element = document.getElementById(elementId);
            element.innerHTML = ""; 
            
            let i = 0;
            function type() {
                if (i < fullText.length) {
                    let char = fullText.charAt(i);
                    element.innerHTML += (char === '\n') ? '<br>' : char;
                    i++;
                    const chatWindow = document.getElementById("chat-window");
                    chatWindow.scrollTop = chatWindow.scrollHeight;
                    setTimeout(type, speed);
                }
            }
            type();
        }

        function addMessage(text, sender, isHTML = false) {
            const chatWindow = document.getElementById("chat-window");
            const msgDiv = document.createElement("div");
            const id = "msg-" + Math.random().toString(36).substr(2, 9); 
            msgDiv.id = id;
            msgDiv.className = `message ${sender}`;
            
            if(isHTML) msgDiv.innerHTML = text;
            else msgDiv.innerText = text;
            
            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return id;
        }

        function handleEnter(event) {
            if (event.key === "Enter") {
                event.preventDefault(); // Prevents mobile keyboard from closing unexpectedly sometimes
                sendMessage();
            }
        }
    </script>
</body>
</html>
