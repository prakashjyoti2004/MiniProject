<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Face Analyzer | DermAI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <style> 
    :root { --primary-color: #4f46e5; --bg-color: #f8fafc; }
    
    body { 
      font-family: 'Inter', sans-serif; 
      background-color: var(--bg-color); 
      opacity: 0; 
      transition: opacity 0.4s ease-in-out; 
    }
    body.page-loaded { opacity: 1; }

    .nav-link { position: relative; padding: 8px 16px; transition: all 0.3s; }
    .nav-link::after { content: ""; position: absolute; width: 0%; height: 2px; left: 0; bottom: -3px; background-color: var(--primary-color); transition: width 0.3s; }
    .nav-link:hover::after, .nav-link.active::after { width: 100%; }
    .nav-link.active { color: var(--primary-color) !important; }

    .btn-3d { position: relative; display: inline-flex; align-items: center; justify-content: center; border: none; transition: all 0.25s ease; perspective: 1000px; cursor: pointer; }
    .btn-3d:active { transform: translateY(4px); }
    .btn-3d-primary { background: linear-gradient(145deg, #4f46e5, #3730a3); box-shadow: 0 6px 0 #312e81, 0 12px 20px rgba(0, 0, 0, 0.3); color: white; }
    .btn-3d-primary:hover:not(:disabled) { transform: translateY(-3px); }
    .btn-3d-primary:disabled { background: #94a3b8; box-shadow: 0 6px 0 #64748b; cursor: not-allowed; opacity: 0.7; }
    
    .scanner-box { position: relative; overflow: hidden; border-radius: 1rem; background: #000; border: 4px solid white; }
    .scan-line { position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: #10b981; box-shadow: 0 0 20px #10b981; animation: scanAnim 3s linear infinite; z-index: 10; }
    
    @keyframes scanAnim { 0% { top: 0; } 100% { top: 100%; } }

    .circular-chart { max-width: 140px; margin: auto; }
    .circle-bg { fill: none; stroke: #e2e8f0; stroke-width: 3; }
    .circle { fill: none; stroke-width: 3; stroke-linecap: round; transition: stroke-dasharray 1.5s ease; }
    .glass-card { background: white; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.05); }
    #live-video { transform: scaleX(-1); }
  </style>
</head>

<body class="min-h-screen flex flex-col">

 <header class="w-full py-4 px-6 md:px-10 flex justify-between items-center bg-white shadow-sm sticky top-0 z-50">
  <a href="/" class="nav-link-smooth text-2xl font-extrabold text-[var(--primary-color)] flex items-center gap-2">
    <i class="ph-fill ph-dna"></i> DermAI
  </a>

  <nav class="hidden md:flex items-center justify-center space-x-8">
    <a href="/" class="nav-link-smooth nav-link text-gray-700 font-semibold">Home</a>
    <a href="/about" class="nav-link-smooth nav-link text-gray-700 font-semibold">About</a>
    <a href="/upload" class="nav-link-smooth nav-link text-gray-700 font-semibold active">Scan</a>
    <a href="/history" class="nav-link-smooth nav-link text-gray-700 font-semibold">History</a>
  </nav>

  <div class="hidden md:block w-24"></div> 
</header>

  <main class="flex-grow flex items-center justify-center p-4 py-10">
    <div class="w-full max-w-2xl">
      
      <div class="text-center mb-8">
        <h2 class="text-3xl font-extrabold text-gray-900 mb-2">Facial Skin Analysis</h2>
      </div>

      <div id="form-state" class="glass-card p-6 md:p-8">
        <div class="mb-6">
          <label class="block text-sm font-bold text-gray-700 mb-3">Upload or Capture Photo <span class="text-red-500">*</span></label>
          
          <div class="grid grid-cols-1 md:grid-cols-3 gap-4" id="upload-buttons">
            <button onclick="document.getElementById('file-upload').click()" class="btn-3d bg-white border-2 border-gray-200 py-4 rounded-xl flex flex-col items-center gap-2">
              <i class="ph-bold ph-image text-2xl text-indigo-600"></i>
              <span class="text-xs font-bold uppercase tracking-wider">Gallery</span>
            </button>
            <input type="file" id="file-upload" class="hidden" accept="image/*">

            <button onclick="document.getElementById('native-camera').click()" class="btn-3d bg-white border-2 border-gray-200 py-4 rounded-xl flex flex-col items-center gap-2">
              <i class="ph-bold ph-device-mobile-camera text-2xl text-indigo-600"></i>
              <span class="text-xs font-bold uppercase tracking-wider">Camera</span>
            </button>
            <input type="file" id="native-camera" class="hidden" accept="image/*" capture="user">

            <button onclick="startLiveCamera()" class="btn-3d bg-white border-2 border-gray-200 py-4 rounded-xl flex flex-col items-center gap-2">
              <i class="ph-bold ph-webcam text-2xl text-indigo-600"></i>
              <span class="text-xs font-bold uppercase tracking-wider">Webcam</span>
            </button>
          </div>

          <div id="camera-container" class="hidden relative w-full aspect-video bg-black rounded-xl overflow-hidden mt-4">
            <video id="live-video" class="w-full h-full object-cover" autoplay playsinline></video>
            <div class="absolute inset-0 border-[3px] border-dashed border-white/30 m-8 rounded-full pointer-events-none"></div>
            <div class="absolute bottom-4 left-0 w-full flex justify-center gap-3">
              <button onclick="takeSnapshot()" class="bg-indigo-600 text-white px-6 py-2 rounded-full font-bold shadow-lg">Capture</button>
              <button onclick="stopCamera()" class="bg-white text-gray-800 px-6 py-2 rounded-full font-bold">Exit</button>
            </div>
          </div>

          <div id="preview-container" class="hidden relative w-full h-72 bg-gray-50 rounded-xl overflow-hidden border-2 border-dashed border-indigo-200 mt-4">
            <img id="preview-image" src="" class="w-full h-full object-contain">
            <button onclick="removeImage()" class="absolute top-3 right-3 bg-red-500 text-white p-2 rounded-full shadow-lg">
              <i class="ph-bold ph-trash"></i>
            </button>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
          <div class="bg-gray-50 p-3 rounded-xl border border-gray-100">
            <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Skin Type</label>
            <select id="skin-type" class="w-full bg-transparent font-bold text-gray-800 outline-none">
              <option value="oily">Oily</option><option value="dry">Dry</option><option value="normal" selected>Normal</option>
            </select>
          </div>
          <div class="bg-gray-50 p-3 rounded-xl border border-gray-100">
            <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Target Zone</label>
            <select id="facial-zone" class="w-full bg-transparent font-bold text-gray-800 outline-none">
              <option value="full-face">Full Face</option><option value="t-zone">T-Zone</option>
            </select>
          </div>
        </div>

        <div class="mb-6 flex items-center gap-3 p-4 bg-indigo-50/50 rounded-xl border border-indigo-100">
          <input type="checkbox" id="consent-check" onchange="checkFormState()" class="w-5 h-5 accent-indigo-600">
          <label for="consent-check" class="text-xs text-gray-600 font-medium">I authorize DermAI to process this image for dermatological assessment.</label>
        </div>

        <button id="submit-btn" onclick="submitToAPI()" disabled class="w-full btn-3d btn-3d-primary py-4 rounded-2xl font-bold text-lg">
          Run Diagnostic Scan <i class="ph-bold ph-lightning ml-2"></i>
        </button>
      </div>

      <div id="analyzing-state" class="hidden glass-card p-10 text-center">
        <h3 class="text-2xl font-extrabold text-gray-800 mb-2">Analyzing Features...</h3>
        <p class="text-gray-500 text-sm mb-8">DermAI is identifying structural skin patterns</p>
        
        <div class="w-64 h-64 mx-auto scanner-box mb-8">
          <img id="analyzing-preview" src="" class="w-full h-full object-cover opacity-50">
          <div class="scan-line"></div>
        </div>
        
        <div class="max-w-xs mx-auto">
          <div class="w-full bg-gray-100 rounded-full h-1.5 mb-2">
            <div id="progress-bar" class="bg-indigo-600 h-1.5 rounded-full transition-all duration-700 w-0"></div>
          </div>
          <p id="progress-text" class="text-[10px] font-bold text-indigo-600 uppercase tracking-tighter">Initializing Neural Engine...</p>
        </div>
      </div>

      <div id="result-state" class="hidden">
        <div class="glass-card p-8 border-t-8 border-indigo-600">
          <div class="flex justify-between items-start mb-8">
            <div>
              <span class="bg-green-100 text-green-700 text-[10px] font-bold px-3 py-1 rounded-full uppercase">Scan Complete</span>
              <h3 id="result-diagnosis" class="text-4xl font-black text-gray-900 mt-2 tracking-tight">--</h3>
            </div>
            <div class="relative w-24 h-24">
              <svg viewBox="0 0 36 36" class="circular-chart">
                <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                <path id="confidence-circle" class="circle stroke-indigo-600" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
              </svg>
              <div class="absolute inset-0 flex items-center justify-center">
                <span id="confidence-text" class="text-lg font-black text-gray-800">0%</span>
              </div>
            </div>
          </div>
          <div class="bg-indigo-50/70 rounded-2xl p-5 mb-8 border border-indigo-100 shadow-inner">
            <h4 class="text-[10px] text-indigo-400 font-black uppercase tracking-widest mb-2 flex items-center gap-1">
              <i class="ph-fill ph-info text-indigo-500 text-lg"></i> AI Insights & Advice
            </h4>
            <p id="result-description" class="text-sm font-semibold text-indigo-900 leading-relaxed">
              Generating insights...
            </p>
          </div>
          <div class="bg-gray-50 rounded-2xl p-4 mb-8 grid grid-cols-2 gap-4">
            <div><p class="text-[10px] text-gray-400 font-bold uppercase">Skin Type</p><p id="res-skin-type" class="font-bold text-gray-700 capitalize">-</p></div>
            <div><p class="text-[10px] text-gray-400 font-bold uppercase">Analysis Zone</p><p id="res-zone" class="font-bold text-gray-700 capitalize">-</p></div>
          </div>

          <div class="flex gap-4">
            <button onclick="location.reload()" class="flex-1 py-4 border-2 border-gray-200 rounded-2xl font-bold text-gray-600 hover:bg-gray-50">New Scan</button>
            <button id="save-history-btn" class="flex-[2] btn-3d btn-3d-primary py-4 rounded-2xl font-bold">Save Report</button>
          </div>
        </div>
      </div>

    </div>
  </main>

<script>
    document.addEventListener("DOMContentLoaded", () => {
      const user = JSON.parse(sessionStorage.getItem('userData'));

      if (!user) {
        window.location.href = '/login'; 
        return;
      }
      
      console.log("Database user connected:", user.name);
    });
        
    document.addEventListener("DOMContentLoaded", () => {
      document.body.classList.add("page-loaded");
      document.querySelectorAll(".nav-link-smooth").forEach(link => {
        link.addEventListener("click", e => {
          e.preventDefault();
          document.body.style.opacity = "0";
          setTimeout(() => { window.location.href = link.href; }, 400);
        });
      });
    });

    const elements = {
      form: document.getElementById('form-state'),
      analyzing: document.getElementById('analyzing-state'),
      result: document.getElementById('result-state'),
      previewBox: document.getElementById('preview-container'),
      uploadBtns: document.getElementById('upload-buttons'),
      submitBtn: document.getElementById('submit-btn'),
      consent: document.getElementById('consent-check')
    };

    let selectedFile = null;
    let videoStream = null;
    let base64ImageData = null; 
    
  
    let latestScanData = null; 

    function checkFormState() {
      elements.submitBtn.disabled = !(selectedFile && elements.consent.checked);
    }

    document.getElementById('file-upload').addEventListener('change', e => handleFile(e.target.files[0]));
    document.getElementById('native-camera').addEventListener('change', e => handleFile(e.target.files[0]));

    function handleFile(file) {
      if (!file) return;
      selectedFile = file;
      const reader = new FileReader();
      
      reader.onload = (e) => {
        base64ImageData = e.target.result; 
        
        document.getElementById('preview-image').src = base64ImageData;
        document.getElementById('analyzing-preview').src = base64ImageData;
        
        elements.previewBox.classList.remove('hidden');
        elements.uploadBtns.classList.add('hidden');
        checkFormState();
      };
      reader.readAsDataURL(file);
    }

    function removeImage() {
      selectedFile = null;
      base64ImageData = null;
      elements.previewBox.classList.add('hidden');
      elements.uploadBtns.classList.remove('hidden');
      checkFormState();
    }


    async function startLiveCamera() {
      try {
        videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        document.getElementById('live-video').srcObject = videoStream;
        elements.uploadBtns.classList.add('hidden');
        document.getElementById('camera-container').classList.remove('hidden');
      } catch (err) { alert("Unable to access camera."); }
    }

    function stopCamera() {
      if (videoStream) videoStream.getTracks().forEach(track => track.stop());
      document.getElementById('camera-container').classList.add('hidden');
      if (!selectedFile) elements.uploadBtns.classList.remove('hidden');
    }

    function takeSnapshot() {
      const video = document.getElementById('live-video');
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);
      canvas.toBlob(blob => {
        const file = new File([blob], "capture.png", { type: "image/png" });
        handleFile(file);
        stopCamera();
      });
    }

 
    async function submitToAPI() {
      // 1. UI changes: Hide form, show analyzing state
      elements.form.classList.add('hidden');
      elements.analyzing.classList.remove('hidden');
      
      const bar = document.getElementById('progress-bar');
      const txt = document.getElementById('progress-text');

      try {
        bar.style.width = '30%';
        txt.innerText = 'Analyzing...';

        // 3. Backend (Server) ko data bhejna
        const response = await fetch('/api/analyze', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            image: base64ImageData,
            skinType: document.getElementById('skin-type').value,
            zone: document.getElementById('facial-zone').value

          })
          
        });

        bar.style.width = '70%';
        txt.innerText = 'DermAI Analyzing Patterns...';

        const result = await response.json();

        if (!response.ok || !result.success) {
          throw new Error(result.error || 'Failed to analyze image.');
        }

        bar.style.width = '100%';
        txt.innerText = 'Generating Report...';

        setTimeout(() => {
          showResults(result.data);
        }, 800);

      } catch (error) {
        console.error("Error connecting to server:", error);
        alert("Failed to analyze image. Please try again. \nError: " + error.message);

        elements.analyzing.classList.add('hidden');
        elements.form.classList.remove('hidden');
      }
      console.log(base64ImageData);
    }

    function showResults(data) {
      elements.analyzing.classList.add('hidden');
      elements.result.classList.remove('hidden');
      
      latestScanData = data;

      document.getElementById('result-diagnosis').innerText = data.diagnosis || "Unknown Condition";
      document.getElementById('res-skin-type').innerText = document.getElementById('skin-type').value;
      document.getElementById('res-zone').innerText = document.getElementById('facial-zone').value;
      document.getElementById('result-description').innerText = data.description || "No specific advice available for this scan.";

      const confValue = data.confidence || 0;
      setTimeout(() => {
        document.getElementById('confidence-circle').setAttribute('stroke-dasharray', `${confValue}, 100`);
        gsap.to("#confidence-text", { innerHTML: confValue + '%', duration: 1.5, snap: { innerHTML: 1 } });
      }, 300);
    }

    document.getElementById('save-history-btn').addEventListener('click', async function() {
      const btn = this;

      const userData = JSON.parse(sessionStorage.getItem('userData'));
      if (!userData || !userData.email) {
          alert("Session expired. Please login again to save.");
          window.location.href = '/login';
          return;
      }

      const originalText = btn.innerHTML;
      btn.innerHTML = "<i class='ph-bold ph-spinner animate-spin'></i> Saving...";
      btn.disabled = true;

      try {
        const response = await fetch('/api/history/save', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                userEmail: userData.email, 
                image: base64ImageData, 
                diagnosis: latestScanData.diagnosis,
                confidence: latestScanData.confidence,
                description: latestScanData.description,
                skinType: document.getElementById('skin-type').value,
                zone: document.getElementById('facial-zone').value
            })
        });

        const result = await response.json();

        if (result.success) {
            btn.innerHTML = "Saved to Your History! <i class='ph-fill ph-cloud-check ml-2'></i>";
            btn.classList.replace('btn-3d-primary', 'bg-green-500');
            
            setTimeout(() => {
              document.body.style.opacity = "0";
              setTimeout(() => window.location.href = '/', 400);
            }, 1200);
        } else {
            throw new Error(result.message);
        }
      } catch (error) {
          console.error("Save Error:", error);
          alert("Failed to save report: " + error.message);
          btn.innerHTML = originalText;
          btn.disabled = false;
      }
    });

    window.addEventListener("pageshow", (event) => {
      if (event.persisted || document.body.style.opacity === "0") {
        document.body.style.opacity = "1";
        document.body.classList.add("page-loaded");
      }
    });
  </script>
</body>
</html>
