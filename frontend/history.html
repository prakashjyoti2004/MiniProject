<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medical Records | DermAI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <style> 
    :root { --primary-color: #4f46e5; --bg-color: #f8fafc; }
    body { 
        font-family: 'Inter', sans-serif; 
        background-color: var(--bg-color); 
        opacity: 0; 
        transition: opacity 0.4s ease-in-out; 
    }
    body.page-loaded { opacity: 1; }

    .header-sticky { position: sticky; top: 0; z-index: 50; backdrop-filter: blur(12px); background-color: rgba(255,255,255,0.85); }

    .nav-link { position: relative; padding: 8px 16px; transition: all 0.3s; }
    .nav-link::after { content: ""; position: absolute; width: 0%; height: 2px; left: 0; bottom: -3px; background-color: var(--primary-color); transition: width 0.3s; }
    .nav-link:hover::after, .nav-link.active::after { width: 100%; }
    .nav-link.active { color: var(--primary-color) !important; }

    .glass-card { background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.05); transition: transform 0.3s ease; }
    .glass-card:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(79, 70, 229, 0.1); }

    .reveal { opacity: 0; transform: translateY(20px); transition: all 0.6s ease; }
    .reveal.active { opacity: 1; transform: translateY(0); }

    .btn-3d-primary { 
        background: linear-gradient(145deg, #4f46e5, #3730a3); 
        box-shadow: 0 6px 0 #312e81, 0 12px 20px rgba(0, 0, 0, 0.2); 
        color: white; 
        transition: all 0.2s;
    }
    .btn-3d-primary:hover { transform: translateY(-2px); }
    .btn-3d-primary:active { transform: translateY(4px); box-shadow: 0 2px 0 #312e81; }
  </style>
</head>

<body class="min-h-screen flex flex-col relative">

<header class="w-full py-4 px-6 md:px-10 flex justify-between items-center bg-white shadow-sm sticky top-0 z-50">
  <a href="/" class="nav-link-smooth text-2xl font-extrabold text-[var(--primary-color)] flex items-center gap-2">
    <i class="ph-fill ph-dna"></i> DermAI
  </a>

  <nav class="hidden md:flex items-center justify-center space-x-8">
    <a href="/" class="nav-link-smooth nav-link text-gray-700 font-semibold">Home</a>
    <a href="/about" class="nav-link-smooth nav-link text-gray-700 font-semibold">About</a>
    <a href="/upload" class="nav-link-smooth nav-link text-gray-700 font-semibold">Scan</a>
    <a href="/history" class="nav-link-smooth nav-link text-gray-700 font-semibold active">History</a>
  </nav>
  <div class="hidden md:block w-24"></div>
</header>

  <main class="flex-grow py-12 px-4">
    <div class="max-w-4xl mx-auto">
      
      <div class="text-center mb-10 reveal active">
        <h2 class="text-4xl font-extrabold text-gray-900 mb-4">Medical Records 🗄️</h2>
        <p class="text-gray-600" id="user-greeting">Your secure, cross-device diagnostic history.</p>
      </div>
      
      <div id="history-list" class="space-y-6">
          <div class="text-center py-20" id="loading-state">
             <i class="ph-bold ph-spinner-gap animate-spin text-5xl text-[var(--primary-color)] mb-4 inline-block"></i>
             <h3 class="text-xl font-bold text-gray-800">Fetching cloud records...</h3>
             <p class="text-gray-500">Connecting to secure encrypted server</p>
          </div>
      </div>
      
    </div>
  </main> 

  <footer class="bg-gray-900 text-white text-center py-6 mt-auto">
    <p>&copy; 2026 DermAI Assistant. All Rights Reserved.</p>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
        // Page Fade-in
        document.body.classList.add("page-loaded");

        // --- AUTHENTICATION CHECK ---
        const userData = JSON.parse(sessionStorage.getItem('userData'));
        if (!userData) {
            // Agar user login nahi hai toh login page pe bhej do
            window.location.href = '/login';
            return;
        }

        // Greeting update karna
        document.getElementById('user-greeting').innerText = `Secure history for ${userData.email}`;
        
        // Fetch History from MongoDB
        fetchDatabaseHistory(userData.email);

        // Smooth Transitions
        const links = document.querySelectorAll(".nav-link-smooth");
        links.forEach(link => {
            link.addEventListener("click", function(e) {
                e.preventDefault();
                let targetUrl = this.href;
                document.body.style.opacity = "0";
                setTimeout(() => { window.location.href = targetUrl; }, 400);
            });
        });
    });

    // FETCH FROM BACKEND API
    async function fetchDatabaseHistory(userEmail) {
        const historyList = document.getElementById('history-list');

        try {
            // Server API call jo MongoDB se data layegi
            const response = await fetch(`/api/history/${userEmail}`);
            if (!response.ok) throw new Error("Server unreachable");
            
            const result = await response.json(); 
            
            if(result.success) {
                renderHistoryCards(result.data, historyList, false);
            } else {
                throw new Error(result.message);
            }

        } catch (error) {
            console.warn("Using local fallback:", error);
            let localRecords = JSON.parse(localStorage.getItem('dermAI_history_records') || '[]');
            renderHistoryCards(localRecords, historyList, true);
        }
    }

    // RENDER CARDS LOGIC
    function renderHistoryCards(records, container, isOfflineMode) {
        container.innerHTML = ''; // Loading state hata do

        // Offline Warning
        if (isOfflineMode && records.length > 0) {
            const warning = document.createElement('div');
            warning.className = 'bg-yellow-50 border-l-4 border-yellow-500 p-4 mb-6 rounded flex gap-3 items-center';
            warning.innerHTML = `
                <i class="ph-fill ph-warning-circle text-yellow-500 text-2xl"></i>
                <p class="text-sm text-yellow-800 font-medium">Offline Mode: Showing locally saved diagnostics.</p>
            `;
            container.appendChild(warning);
        }

        // Empty State (No records found)
        if (records.length === 0) {
             container.innerHTML += `
              <div class="glass-card p-10 text-center reveal active border-dashed border-2">
                  <i class="ph-fill ph-folder-open text-5xl text-gray-300 mb-4 block"></i>
                  <h3 class="text-2xl font-bold text-gray-900 mb-2">No Records Found</h3>
                  <p class="text-gray-500 mb-8">You haven't performed any skin analysis yet.</p>
                  <a href="/upload" class="btn-3d-primary py-3 px-8 rounded-full font-bold inline-block">
                    Start AI Scan Now
                  </a>
              </div>`;
            return;
        }
        
        // Render each scan record
        records.forEach((record, index) => {
            const card = document.createElement('div');
            card.className = `glass-card p-6 reveal active flex flex-col md:flex-row gap-6 items-center justify-between border-l-4 border-indigo-500`;
            card.style.transitionDelay = `${index * 0.1}s`;
            
            // Fallback for image
            const imageSrc = record.image || record.img || 'https://via.placeholder.com/150';

            // MongoDB date formatter
            let dateStr = "Recent";
            if(record.date) {
                const dateObj = new Date(record.date);
                dateStr = dateObj.toLocaleDateString('en-US', { day: 'numeric', month: 'short', year: 'numeric' });
            }

            // Confidence Color Indicator
            let confColor = "text-green-600";
            if (record.confidence < 75) confColor = "text-yellow-600";
            if (record.confidence < 50) confColor = "text-red-600";

            card.innerHTML = `
                <div class="flex items-center gap-5 flex-grow w-full">
                  <div class="w-20 h-20 md:w-24 md:h-24 rounded-xl overflow-hidden border border-gray-200 flex-shrink-0 bg-gray-50">
                      <img src="${imageSrc}" class="w-full h-full object-cover">
                  </div>
                  <div>
                      <h3 class="text-xl md:text-2xl font-bold text-gray-900 mb-1">${record.diagnosis || record.prediction || "Unknown Condition"}</h3>
                      
                      <div class="flex items-center gap-3 text-sm">
                        <span class="font-bold ${confColor} bg-gray-50 px-2 py-0.5 rounded border border-gray-100">
                          ${record.confidence}% Match
                        </span>
                        <span class="text-gray-400 font-semibold uppercase text-[10px] tracking-wider border border-gray-200 px-2 py-0.5 rounded">
                          ${record.zone || "Face"}
                        </span>
                      </div>
                      
                      ${record.description ? `<p class="mt-2 text-sm text-gray-500 line-clamp-2 italic border-l-2 border-indigo-200 pl-2">"${record.description}"</p>` : ''}
                  </div>
                </div>
                <div class="text-left md:text-right w-full md:w-auto mt-4 md:mt-0 flex md:flex-col justify-between items-center md:items-end">
                    <p class="text-xs font-bold text-indigo-400 uppercase tracking-widest bg-indigo-50 px-3 py-1 rounded-full"><i class="ph-bold ph-calendar-blank"></i> ${dateStr}</p>
                    <button class="text-indigo-600 font-bold text-sm hover:underline mt-2 hidden md:block">View Details</button>
                </div>
            `;
            container.appendChild(card);
        });
    }

    // Browser ka Back Button fix karne ke liye
    window.addEventListener("pageshow", (event) => {
      // Agar user pichle page se wapas aaya hai (Back arrow), toh parda hatao
      if (event.persisted || document.body.style.opacity === "0") {
        document.body.style.opacity = "1";
        document.body.classList.add("page-loaded");
      }
    });
  </script>
</body>
</html>
