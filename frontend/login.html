<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | DermAI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <style> 
    :root { --primary-color: #4f46e5; --bg-color: #f8fafc; }
    body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); overflow-x: hidden; }

 
    .btn-3d { position: relative; display: inline-flex; align-items: center; justify-content: center; gap: 8px; border: none; transition: all 0.25s ease; perspective: 1000px; }
    .btn-3d:active:not(:disabled) { transform: translateY(4px); }
    .btn-3d-primary { background: linear-gradient(145deg, #4f46e5, #3730a3); box-shadow: 0 6px 0 #312e81, 0 12px 20px rgba(0, 0, 0, 0.3); color: white; }
    .btn-3d-primary:hover:not(:disabled) { background: linear-gradient(145deg, #5a55ff, #4238c9); transform: translateY(-3px); }
    .btn-3d-primary:disabled { opacity: 0.7; cursor: not-allowed; transform: translateY(0); box-shadow: 0 6px 0 #312e81; }

    .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(16px); border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.5); }

    #particles-js { position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: -1; pointer-events: none;}

    /* Input styling */
    .input-field { padding-left: 44px; transition: all 0.3s ease; }
    .input-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #9ca3af; font-size: 20px; transition: color 0.3s ease; }
    .input-group:focus-within .input-icon { color: var(--primary-color); }
    .input-field:focus { border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2); }
  </style>
</head>

<body class="min-h-screen relative">
  
  <div id="particles-js"></div>

  <a href="/" class="absolute top-4 left-4 md:top-8 md:left-8 flex items-center gap-2 text-gray-700 font-bold hover:text-[var(--primary-color)] transition-colors z-20 bg-white/60 px-3 py-1.5 md:px-4 md:py-2 rounded-full backdrop-blur-md border border-gray-200 shadow-sm text-sm md:text-base">
    <i class="ph-bold ph-arrow-left"></i> Back
  </a>

  <div class="min-h-screen w-full flex items-center justify-center p-4 py-16 md:py-12 z-10 relative">
      <div class="w-full max-w-md mx-auto">
        
        <div class="text-center mb-6 md:mb-8">
          <div class="inline-flex items-center justify-center w-12 h-12 md:w-16 md:h-16 bg-[var(--primary-color)] text-white rounded-2xl mb-4 shadow-lg shadow-indigo-500/30 transform rotate-3 hover:rotate-0 transition-transform">
            <i class="ph-fill ph-dna text-2xl md:text-4xl"></i>
          </div>
          <h1 class="text-2xl md:text-3xl font-extrabold text-gray-900 tracking-tight">Welcome to DermAI</h1>
          <p class="text-sm md:text-base text-gray-500 mt-2">Your personal AI skin health assistant</p>
        </div>

        <div class="glass-card p-6 md:p-8 w-full relative overflow-hidden">
          
          <div class="flex bg-gray-100 p-1 rounded-xl mb-6 md:mb-8 relative">
            <div id="toggle-bg" class="absolute top-1 left-1 w-[calc(50%-4px)] h-[calc(100%-8px)] bg-white rounded-lg shadow-sm transition-transform duration-300 ease-in-out"></div>
            <button onclick="switchForm('login')" id="btn-login" class="flex-1 py-2 text-sm font-bold z-10 text-[var(--primary-color)] transition-colors">Sign In</button>
            <button onclick="switchForm('register')" id="btn-register" class="flex-1 py-2 text-sm font-bold z-10 text-gray-500 transition-colors">Create Account</button>
          </div>

          <form id="login-form" class="space-y-4" onsubmit="handleAuth(event, 'login')">
            <div class="relative input-group">
              <i class="ph-fill ph-envelope-simple input-icon"></i>
              <input type="email" id="login-email" placeholder="Email Address" required class="input-field w-full border-2 border-gray-200 rounded-xl py-3 pr-4 bg-white/50 outline-none text-gray-700 font-medium">
            </div>
            
            <div class="relative input-group">
              <i class="ph-fill ph-lock-key input-icon"></i>
              <input type="password" id="login-password" placeholder="Password" required class="input-field w-full border-2 border-gray-200 rounded-xl py-3 pr-4 bg-white/50 outline-none text-gray-700 font-medium">
            </div>

            <div class="flex justify-end">
              <a href="#" class="text-sm font-bold text-[var(--primary-color)] hover:underline">Forgot Password?</a>
            </div>

            <p id="login-error" class="text-red-500 text-sm font-bold text-center hidden"></p>

            <button type="submit" id="submit-login" class="w-full btn-3d btn-3d-primary py-3.5 md:py-4 rounded-xl font-bold text-lg mt-2">
              Sign In <i class="ph-bold ph-sign-in"></i>
            </button>
          </form>

          <form id="register-form" class="space-y-4 hidden" onsubmit="handleAuth(event, 'register')">
            <div class="relative input-group">
              <i class="ph-fill ph-user input-icon"></i>
              <input type="text" id="reg-name" placeholder="Full Name" required class="input-field w-full border-2 border-gray-200 rounded-xl py-3 pr-4 bg-white/50 outline-none text-gray-700 font-medium">
            </div>

            <div class="relative input-group">
              <i class="ph-fill ph-envelope-simple input-icon"></i>
              <input type="email" id="reg-email" placeholder="Email Address" required class="input-field w-full border-2 border-gray-200 rounded-xl py-3 pr-4 bg-white/50 outline-none text-gray-700 font-medium">
            </div>
            
            <div class="relative input-group">
              <i class="ph-fill ph-lock-key input-icon"></i>
              <input type="password" id="reg-password" placeholder="Create Password" required class="input-field w-full border-2 border-gray-200 rounded-xl py-3 pr-4 bg-white/50 outline-none text-gray-700 font-medium">
            </div>

            <div class="flex items-start gap-2 pt-1">
              <input type="checkbox" required id="terms" class="mt-1 w-4 h-4 rounded border-gray-300 text-[var(--primary-color)] focus:ring-[var(--primary-color)]">
              <label for="terms" class="text-xs text-gray-500">I agree to the <a href="#" class="text-[var(--primary-color)] font-bold">Terms of Service</a>.</label>
            </div>

            <p id="reg-error" class="text-red-500 text-sm font-bold text-center hidden"></p>

            <button type="submit" id="submit-register" class="w-full btn-3d btn-3d-primary py-3.5 md:py-4 rounded-xl font-bold text-lg mt-2">
              Create Account <i class="ph-bold ph-user-plus"></i>
            </button>
          </form>
        </div>
      </div>
  </div>

  <script>
    // 1. Particles
    particlesJS("particles-js", {
      particles: {
        number: { value: 40 }, color: { value: "#6366f1" }, shape: { type: "circle" },
        opacity: { value: 0.3 }, size: { value: 4 },
        line_linked: { enable: true, distance: 150, color: "#6366f1", opacity: 0.2, width: 1 },
        move: { enable: true, speed: 1.5 }
      }
    });

    // 2. Switching Logic
    const loginForm = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');
    const toggleBg = document.getElementById('toggle-bg');
    const btnLogin = document.getElementById('btn-login');
    const btnRegister = document.getElementById('btn-register');

    function switchForm(type) {
      document.getElementById('login-error').classList.add('hidden');
      document.getElementById('reg-error').classList.add('hidden');
      if (type === 'login') {
        toggleBg.style.transform = 'translateX(0)';
        btnLogin.classList.replace('text-gray-500', 'text-[var(--primary-color)]');
        btnRegister.classList.replace('text-[var(--primary-color)]', 'text-gray-500');
        gsap.to(registerForm, { opacity: 0, x: -20, duration: 0.2, onComplete: () => {
          registerForm.classList.add('hidden');
          loginForm.classList.remove('hidden');
          gsap.fromTo(loginForm, { opacity: 0, x: 20 }, { opacity: 1, x: 0, duration: 0.3 });
        }});
      } else {
        toggleBg.style.transform = 'translateX(100%)';
        btnRegister.classList.replace('text-gray-500', 'text-[var(--primary-color)]');
        btnLogin.classList.replace('text-[var(--primary-color)]', 'text-gray-500');
        gsap.to(loginForm, { opacity: 0, x: 20, duration: 0.2, onComplete: () => {
          loginForm.classList.add('hidden');
          registerForm.classList.remove('hidden');
          gsap.fromTo(registerForm, { opacity: 0, x: -20 }, { opacity: 1, x: 0, duration: 0.3 });
        }});
      }
    }

    // 3. WORKING AUTH LOGIC (MongoDB Connection)
    // 3. UPDATED AUTH LOGIC (Database Connection)
  async function handleAuth(event, type) {
  event.preventDefault();
  
  const btnId = type === 'login' ? 'submit-login' : 'submit-register';
  const btn = document.getElementById(btnId);
  const originalText = btn.innerHTML;
  const errorEl = type === 'login' ? document.getElementById('login-error') : document.getElementById('reg-error');
  
  errorEl.classList.add('hidden');
  btn.disabled = true;
  btn.innerHTML = `<i class="ph-bold ph-spinner-gap animate-spin"></i> Wait...`;

  const email = type === 'login' ? document.getElementById('login-email').value : document.getElementById('reg-email').value;
  const password = type === 'login' ? document.getElementById('login-password').value : document.getElementById('reg-password').value;
  const name = type === 'register' ? document.getElementById('reg-name').value : "";

  try {
    // Yahan request database/backend ko ja rahi hai
    const response = await fetch(type === 'login' ? '/login' : '/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password })
    });

    // --- YAHAN INFO AA RAHI HAI DATABASE SE ---
    const data = await response.json(); 

    if (!response.ok) throw new Error(data.message || 'An Unknown Error Occured');

    if (type === 'login') {
        // 1. Database se aayi info ko 'SessionStorage' mein daal rahe hain
        // (Ye LocalStorage se behtar hai kyunki tab band karte hi clear ho jata hai)
        sessionStorage.setItem('isLoggedIn', 'true');
        sessionStorage.setItem('userData', JSON.stringify(data.user)); // Database ki info yahan save ho gayi

        btn.innerHTML = `Welcome back, ${data.user.name}! ✓`; // DB se naam dikhao
        btn.classList.replace('btn-3d-primary', 'bg-green-600');
        
        // 2. Index page pe bhej do
        setTimeout(() => { window.location.href = '/'; }, 1000);
    } else {
        btn.innerHTML = `Account Created! 🎉`;
        btn.classList.replace('btn-3d-primary', 'bg-green-600');
        setTimeout(() => { switchForm('login'); }, 1500);
    }

  } catch (err) {
    errorEl.innerText = `⚠️ ${err.message}`;
    errorEl.classList.remove('hidden');
    btn.disabled = false;
    btn.innerHTML = originalText;
  }
}


  </script>
</body>
</html>
